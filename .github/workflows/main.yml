name: Renfe Sniper Bot (Búsqueda Manual)

# 1. ESTA SECCIÓN CREA EL FORMULARIO WEB EN GITHUB
on:
  workflow_dispatch:
    inputs:
      origen:
        description: 'Estación de origen (ej. MADRID)'
        required: true
        type: string
      destino:
        description: 'Estación de destino (ej. BARCELONA)'
        required: true
        type: string
      fecha:
        description: 'Fecha del viaje (DD/MM/YYYY)'
        required: true
        type: string
      salida:
        description: 'Hora MÍNIMA salida (ej. 08:00)'
        required: false
        default: '00:00'
        type: string
      llegada:
        description: 'Hora MÁXIMA llegada (ej. 23:59)'
        required: false
        default: '23:59'
        type: string
      duracion:
        description: 'Duración máxima del viaje (ej. 180)'
        required: false
        default: '9999'
        type: string

jobs:
  buscar-billetes:
    runs-on: ubuntu-latest
    
    env:
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TZ: 'Europe/Madrid' 

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium

      # 2. AQUÍ LE PASAMOS TUS INPUTS AL SCRIPT DE PYTHON
      - name: Ejecutar Bot
        run: |
          python -u mainAuto.py -o "${{ inputs.origen }}" -d "${{ inputs.destino }}" -f "${{ inputs.fecha }}" -s "${{ inputs.salida }}" -l "${{ inputs.llegada }}" -t "${{ inputs.duracion }}"
