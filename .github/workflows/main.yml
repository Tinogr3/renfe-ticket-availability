name: Renfe Sniper Bot

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

concurrency:
  group: renfe-bot-group
  cancel-in-progress: true
  
jobs:
  buscar-billetes:
    runs-on: ubuntu-latest
    
    env:
      # Lee las contraseñas de Secrets
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      # Lee la configuración de búsqueda de las Variables
      ORIGEN: ${{ vars.ORIGEN }}
      DESTINO: ${{ vars.DESTINO }}
      FECHA: ${{ vars.FECHA }}
      SALIDA: ${{ vars.SALIDA || '00:00' }}
      LLEGADA: ${{ vars.LLEGADA || '23:59' }}
      DURACION: ${{ vars.DURACION || '9999' }}
      TZ: 'Europe/Madrid' 

    steps:
      - name: Descargar código
        uses: actions/checkout@v3

      - name: Instalar Python y Playwright
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          playwright install chromium

      - name: Ejecutar Bot
        run: |
          python mainOneExecution.py -o "$ORIGEN" -d "$DESTINO" -f "$FECHA" -s "$SALIDA" -l "$LLEGADA" -t "$DURACION"
